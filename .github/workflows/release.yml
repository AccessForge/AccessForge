name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.2.0)"
        required: true
        type: string

defaults:
  run:
    shell: bash

env:
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"

jobs:
  release:
    name: Build & Release
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if release already exists
        run: |
          if gh release view "v${{ inputs.version }}" > /dev/null 2>&1; then
            echo "::error::Release v${{ inputs.version }} already exists."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache LLVM
        id: cache-llvm
        uses: actions/cache@v5
        with:
          path: C:/LLVM
          key: llvm-17-windows

      - name: Install LLVM
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"
          directory: "C:/LLVM"

      - name: Set LIBCLANG_PATH
        run: echo "LIBCLANG_PATH=C:/LLVM/bin" >> $GITHUB_ENV

      - name: Sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Bump version in Cargo.toml
        run: |
          sed -i 's/^version = ".*"/version = "${{ inputs.version }}"/' Cargo.toml
          cargo generate-lockfile

      - name: Build release
        run: cargo build --release

      - name: Commit version bump and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          if ! git diff --cached --quiet; then
            git commit -m "Release v${{ inputs.version }}"
          fi
          git tag "v${{ inputs.version }}"
          git push origin HEAD --tags

      - name: Create GitHub Release
        run: |
          gh release create "v${{ inputs.version }}" \
            target/release/AccessForge.exe \
            --title "AccessForge v${{ inputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}