name: CI

on:
  pull_request:
    branches: [main]

defaults:
  run:
    shell: bash

jobs:
  check:
    name: Build & Test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install LLVM
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"
          directory: "C:/LLVM"

      - name: Set LIBCLANG_PATH
        run: echo "LIBCLANG_PATH=C:/LLVM/bin" >> $GITHUB_ENV

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Build release
        run: cargo build --release
